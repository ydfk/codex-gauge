name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+([+-][0-9A-Za-z.-]+)?$') {
            throw "Release tag must be SemVer, for example v0.1.0"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-x64-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release config
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY || secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          pnpm version:sync "${{ steps.meta.outputs.tag }}"

          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.plugins.updater.endpoints = @(
            "https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
          )

          $hasUpdaterPubkey = -not [string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_PUBKEY)
          $hasSigningKey = -not [string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)
          if ($hasUpdaterPubkey -and $hasSigningKey) {
            $config.bundle.createUpdaterArtifacts = $true
            $config.plugins.updater.pubkey = $env:TAURI_UPDATER_PUBKEY
            "CODEX_GAUGE_UPDATER_ARTIFACTS=true" >> $env:GITHUB_ENV
            Write-Host "Updater artifacts enabled."
          } else {
            $config.bundle.createUpdaterArtifacts = $false
            "CODEX_GAUGE_UPDATER_ARTIFACTS=false" >> $env:GITHUB_ENV
            if (-not $hasUpdaterPubkey) {
              Write-Warning "TAURI_UPDATER_PUBKEY is empty; configure it as a repository variable or secret."
            }
            if (-not $hasSigningKey) {
              Write-Warning "TAURI_SIGNING_PRIVATE_KEY is empty; configure it as a repository secret."
            }
            Write-Warning "Updater signing is not configured; release will skip latest.json and signature artifacts."
          }

          $config | ConvertTo-Json -Depth 20 | Set-Content $configPath -Encoding utf8

      - name: Fast release check
        run: pnpm release:check

      - name: Build Windows x64 bundles
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: List bundle artifacts
        shell: pwsh
        run: |
          $bundlePath = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          Get-ChildItem $bundlePath -Recurse -File | ForEach-Object {
            $_.FullName.Replace((Resolve-Path ".").Path + "\", "")
          }

      - name: Verify updater artifacts
        if: env.CODEX_GAUGE_UPDATER_ARTIFACTS == 'true'
        shell: pwsh
        run: |
          $bundlePath = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          $latest = Get-ChildItem $bundlePath -Recurse -File -Filter "latest.json"
          $zip = Get-ChildItem $bundlePath -Recurse -File -Filter "*.zip"
          $sig = Get-ChildItem $bundlePath -Recurse -File -Filter "*.sig"
          if (-not $latest) {
            throw "Updater artifacts are enabled, but latest.json was not generated."
          }
          if (-not $zip) {
            throw "Updater artifacts are enabled, but updater zip package was not generated."
          }
          if (-not $sig) {
            throw "Updater artifacts are enabled, but signature files were not generated."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Codex Gauge ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/latest.json
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/latest.json
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.sig
